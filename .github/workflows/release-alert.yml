name: Release alert

# Posts (and keeps updated) a PR comment whenever merging the PR would publish a
# new npm release. This mirrors the exact condition publish.yml uses on merge to
# main: a release happens iff package.json's version has no matching v<version>
# tag yet. So here we read the version from the PR branch and check the tag — if
# it's missing, merging will ship @vivekyy/rudder@<version> to npm.
#
# The comment is "sticky": a hidden marker lets us update the same comment on
# every push instead of spamming new ones, and we flip it to a no-release note
# if the version bump is later removed.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-alert-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether merging will publish
        id: check
        run: |
          version="$(node -p "require('./package.json').version")"
          name="$(node -p "require('./package.json').name")"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — merging will NOT publish."
            echo "will_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${tag} not found — merging WILL publish ${name}@${version}."
            echo "will_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update the release-alert comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- release-alert -->';
            const { will_release, version, name, tag } = process.env;
            const willRelease = will_release === 'true';

            const body = willRelease
              ? [
                  marker,
                  '## 🚀 Merging this PR will publish a new release',
                  '',
                  `This PR sets the version to **\`${version}\`**, and no \`${tag}\` tag exists yet.`,
                  `Merging to \`main\` will publish **\`${name}@${version}\`** to npm via`,
                  '`.github/workflows/publish.yml` (and push the `' + tag + '` tag).',
                  '',
                  'If that is not intended, revert the version bump in `package.json` before merging.',
                ].join('\n')
              : [
                  marker,
                  '## 📦 No release on merge',
                  '',
                  `The current version (\`${version}\`) is already tagged (\`${tag}\`), so merging`,
                  'this PR will **not** publish a new npm release. Bump the version in',
                  '`package.json` (`npm version patch --no-git-tag-version`) to ship a user-facing change.',
                ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
        env:
          will_release: ${{ steps.check.outputs.will_release }}
          version: ${{ steps.check.outputs.version }}
          name: ${{ steps.check.outputs.name }}
          tag: ${{ steps.check.outputs.tag }}
