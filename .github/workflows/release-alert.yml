name: Release alert

# Posts (and keeps updated) a PR comment whenever merging the PR would publish a
# package version or create a GitHub Release. This mirrors publish.yml: npmjs.org
# is gated by the v<version> tag, while GitHub Packages and GitHub Releases are
# checked directly so existing npm releases can be backfilled there.
#
# The comment is "sticky": a hidden marker lets us update the same comment on
# every push instead of spamming new ones, and we flip it to a no-release note
# if the version bump is later removed.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  packages: read
  pull-requests: write

concurrency:
  group: release-alert-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether merging will publish
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./package.json').version")"
          name="$(node -p "require('./package.json').name")"
          tag="v${version}"
          if [[ "${name}" != @*/* ]]; then
            echo "::error::GitHub Packages requires a scoped package name; got ${name}."
            exit 1
          fi

          scope="${name%%/*}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "scope=${scope}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — merging will not publish to npmjs.org."
            npm_publish=false
          else
            echo "Tag ${tag} not found — merging will publish to npmjs.org."
            npm_publish=true
          fi
          echo "npm_publish=${npm_publish}" >> "$GITHUB_OUTPUT"

          npmrc="${RUNNER_TEMP}/github-packages.npmrc"
          {
            echo "${scope}:registry=https://npm.pkg.github.com"
            echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}"
          } > "${npmrc}"

          if NPM_CONFIG_USERCONFIG="${npmrc}" npm view "${name}@${version}" version --registry=https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "GitHub Packages already has ${name}@${version}."
            github_publish=false
          else
            echo "GitHub Packages is missing ${name}@${version} — merging will publish it."
            github_publish=true
          fi
          echo "github_publish=${github_publish}" >> "$GITHUB_OUTPUT"

          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "GitHub Release ${tag} already exists."
            github_release=false
          else
            echo "GitHub Release ${tag} is missing — merging will create it with autogenerated release notes."
            github_release=true
          fi
          echo "github_release=${github_release}" >> "$GITHUB_OUTPUT"

          if [[ "${npm_publish}" == "true" || "${github_publish}" == "true" || "${github_release}" == "true" ]]; then
            echo "will_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "will_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update the release-alert comment
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- release-alert -->';
            const { will_publish, npm_publish, github_publish, github_release, version, name, tag } = process.env;
            const willPublish = will_publish === 'true';
            const packageTargets = [
              npm_publish === 'true' ? 'npmjs.org' : null,
              github_publish === 'true' ? 'GitHub Packages' : null,
            ].filter(Boolean).join(' and ');
            const publishLines = packageTargets
              ? [
                  `Merging to \`main\` will publish **\`${name}@${version}\`** to ${packageTargets} via`,
                  '`.github/workflows/publish.yml`.',
                ]
              : [];

            const body = willPublish
              ? [
                  marker,
                  '## 🚀 Merging this PR will publish package artifacts',
                  '',
                  `This PR sets the version to **\`${version}\`**.`,
                  ...publishLines,
                  npm_publish === 'true'
                    ? `The workflow will push the \`${tag}\` tag after the publish succeeds.`
                    : `The \`${tag}\` tag already exists, so this only backfills missing artifacts.`,
                  '',
                  npm_publish === 'true'
                    ? 'If that is not intended, revert the version bump in `package.json` before merging.'
                    : 'If that is not intended, do not merge this artifact backfill change.',
                ].join('\n')
              : [
                  marker,
                  '## 📦 No package publish on merge',
                  '',
                  `The current version (\`${version}\`) is already tagged (\`${tag}\`), exists in GitHub Packages,`,
                  'and has a GitHub Release, so merging this PR will **not** publish release artifacts. Bump the version in',
                  '`package.json` (`npm version patch --no-git-tag-version`) to ship a user-facing change.',
                ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
        env:
          will_publish: ${{ steps.check.outputs.will_publish }}
          npm_publish: ${{ steps.check.outputs.npm_publish }}
          github_publish: ${{ steps.check.outputs.github_publish }}
          github_release: ${{ steps.check.outputs.github_release }}
          version: ${{ steps.check.outputs.version }}
          name: ${{ steps.check.outputs.name }}
          tag: ${{ steps.check.outputs.tag }}
