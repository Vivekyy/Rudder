name: Release alert

# Posts (and keeps updated) a PR comment whenever merging the PR would create a
# new desktop release. The comment is "sticky": a hidden marker lets us update
# the same comment on every push instead of spamming new ones.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: release-alert-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine whether a release tag is missing
        id: check
        run: |
          base_ref="${GITHUB_BASE_REF:-main}"
          current_version="$(git show "origin/${base_ref}:package.json" | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
          new_version="$(node -p "require('./package.json').version")"
          current_tag="v${current_version}"
          new_tag="v${new_version}"
          echo "current_version=${current_version}" >> "$GITHUB_OUTPUT"
          echo "current_tag=${current_tag}" >> "$GITHUB_OUTPUT"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=${new_tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${new_tag}" >/dev/null; then
            echo "Tag ${new_tag} already exists - merging will NOT create a new release."
            echo "will_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${new_tag} not found - merging WILL create a desktop release."
            echo "will_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update the release-alert comment
        uses: actions/github-script@v9
        env:
          will_release: ${{ steps.check.outputs.will_release }}
          current_version: ${{ steps.check.outputs.current_version }}
          current_tag: ${{ steps.check.outputs.current_tag }}
          new_version: ${{ steps.check.outputs.new_version }}
          new_tag: ${{ steps.check.outputs.new_tag }}
        with:
          script: |
            const marker = '<!-- release-alert -->';
            const { will_release, current_version, current_tag, new_version, new_tag } = process.env;
            const willRelease = will_release === 'true';

            const body = willRelease
              ? [
                  marker,
                  '## 🚀 Merging this PR will create a desktop release',
                  '',
                  `This PR sets the version to **\`${new_version}\`**, and no \`${new_tag}\` tag exists yet.`,
                  'Merging to `main` will package Rudder and create a draft desktop release.',
                  '',
                  `🏷️ The merge commit will be tagged as \`${new_tag}\` via \`.github/workflows/publish.yml\`.`,
                  `If that is not intended, keep \`package.json\` at the current version: \`${current_version}\` (\`${current_tag}\`).`,
                ].join('\n')
              : [
                  marker,
                  '## 📦 No desktop release on merge',
                  '',
                  `The current version (\`${new_version}\`) is already tagged (\`${new_tag}\`), so merging this PR`,
                  'will **not** create a new desktop release.',
                  '',
                  'If that is not intended, bump the version in `package.json` to prepare a new release.',
                ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
