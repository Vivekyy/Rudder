name: Plugin release alert

# Keeps a sticky PR comment in sync with the plugin artifacts that a merge to
# main would publish or create.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: plugin-release-alert-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  release-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Determine whether merging will release the plugin
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          tag="rudder-plugin-v${version}"

          if [[ "${name}" != "@ruddercode/rudder-plugin" ]]; then
            echo "::error::Expected the root package to be @ruddercode/rudder-plugin; got ${name}."
            exit 1
          fi

          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if npm_view_output="$(npm view "${name}@${version}" version --registry=https://registry.npmjs.org 2>&1)"; then
            npm_publish=false
          elif [[ "${npm_view_output}" == *"E404"* || "${npm_view_output}" == *"404 Not Found"* ]]; then
            npm_publish=true
          else
            echo "::error::Could not determine whether npmjs.org has ${name}@${version}."
            printf '%s\n' "${npm_view_output}"
            exit 1
          fi
          echo "npm_publish=${npm_publish}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_create=false
          else
            tag_create=true
          fi
          echo "tag_create=${tag_create}" >> "$GITHUB_OUTPUT"

          if release_view_output="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" 2>&1)"; then
            release_create=false
          elif [[ "${release_view_output}" == *"HTTP 404"* ]]; then
            release_create=true
          else
            echo "::error::Could not determine whether GitHub Release ${tag} exists."
            printf '%s\n' "${release_view_output}"
            exit 1
          fi
          echo "release_create=${release_create}" >> "$GITHUB_OUTPUT"

          if [[ "${npm_publish}" == "true" || "${tag_create}" == "true" || "${release_create}" == "true" ]]; then
            echo "will_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "will_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post or update the plugin release comment
        uses: actions/github-script@v7
        env:
          will_release: ${{ steps.check.outputs.will_release }}
          npm_publish: ${{ steps.check.outputs.npm_publish }}
          tag_create: ${{ steps.check.outputs.tag_create }}
          release_create: ${{ steps.check.outputs.release_create }}
          version: ${{ steps.check.outputs.version }}
          name: ${{ steps.check.outputs.name }}
          tag: ${{ steps.check.outputs.tag }}
        with:
          script: |
            const marker = '<!-- release-alert -->';
            const {
              will_release,
              npm_publish,
              tag_create,
              release_create,
              version,
              name,
              tag,
            } = process.env;
            const releaseLines = [
              ...(npm_publish === 'true'
                ? [`Publish **\`${name}@${version}\`** through npm Trusted Publishing.`]
                : []),
              ...(tag_create === 'true'
                ? [`Create the plugin tag \`${tag}\`.`]
                : []),
              ...(release_create === 'true'
                ? [`Create the GitHub Release for \`${tag}\`.`]
                : []),
            ];
            const body = will_release === 'true'
              ? [
                  marker,
                  '## 🔌 Merging this PR will release the Rudder plugin',
                  '',
                  ...releaseLines,
                  '',
                  'The release runs through `.github/workflows/publish.yml` after merge.',
                ].join('\n')
              : [
                  marker,
                  '## 📦 No plugin release on merge',
                  '',
                  `The plugin package, tag, and GitHub Release already exist for \`${version}\`.`,
                  'Bump `package.json` to release a new plugin version.',
                ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number }
            );
            const existing = comments.find(
              (comment) => comment.body && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
