name: Enforce .agentsignore

on:
  pull_request:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  enforce-agentsignore:
    name: enforce-agentsignore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect agent authors and co-authors
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail

          authors="${RUNNER_TEMP}/pull-request-authors"
          agent_pattern='(^|[^[:alnum:]])(agent|aider|claude|cline|codex|copilot|cursor|cursoragent|devin|gemini|jules|windsurf)([^[:alnum:]]|$)|@(anthropic|cursor|openai)\.com'

          git log \
            --format='%an <%ae>%n%(trailers:key=Co-authored-by,valueonly,separator=%x0a)' \
            "${BASE_SHA}..${HEAD_SHA}" > "${authors}"

          if grep -Eiq "${agent_pattern}" "${authors}" \
            || grep -Eiq "${agent_pattern}" <<< "${PR_AUTHOR_LOGIN}"; then
            echo "agent_authored=true" >> "${GITHUB_OUTPUT}"
            echo "Agent authorship or co-authorship detected."
          else
            echo "agent_authored=false" >> "${GITHUB_OUTPUT}"
            echo "No agent authorship or co-authorship detected."
          fi

      - name: Evaluate changes to agent-protected paths
        if: steps.detect.outputs.agent_authored == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed_paths="${RUNNER_TEMP}/agentsignore-changed-paths"
          base_protected_paths="${RUNNER_TEMP}/agentsignore-base-protected-paths"
          head_protected_paths="${RUNNER_TEMP}/agentsignore-head-protected-paths"
          rules_dir="${RUNNER_TEMP}/agentsignore-rules"

          git diff --name-only --no-renames -z "${BASE_SHA}" "${HEAD_SHA}" > "${changed_paths}"
          mkdir -p "${rules_dir}"

          match_protected_paths() {
            local revision="$1"
            local protected_paths="$2"
            local matcher_dir
            local rules_file="${rules_dir}/${revision}"
            : > "${protected_paths}"

            if ! git show "${revision}:.agentsignore" > "${rules_file}" 2>/dev/null; then
              return
            fi

            matcher_dir="$(mktemp -d "${RUNNER_TEMP}/agentsignore-matcher.XXXXXX")"
            git -C "${matcher_dir}" init --quiet
            cp "${rules_file}" "${matcher_dir}/.git/info/exclude"
            git -C "${matcher_dir}" check-ignore --no-index -z --stdin \
              < "${changed_paths}" >> "${protected_paths}" || true
            sort -zu "${protected_paths}" -o "${protected_paths}"
          }

          print_paths() {
            local paths_file="$1"
            while IFS= read -r -d '' path; do
              echo "  ${path}"
            done < "${paths_file}"
          }

          match_protected_paths "${BASE_SHA}" "${base_protected_paths}"
          match_protected_paths "${HEAD_SHA}" "${head_protected_paths}"

          if [[ -s "${head_protected_paths}" ]]; then
            conclusion="failure"
            title="Agent-protected paths changed"
            summary="This pull request changes paths that remain protected by its .agentsignore rules."
            echo "::error::This pull request changes paths protected by its .agentsignore:"
            print_paths "${head_protected_paths}"
          elif [[ -s "${base_protected_paths}" ]]; then
            conclusion="neutral"
            title="Agent protection was explicitly relaxed"
            summary="This pull request changes paths protected by the base revision, but its .agentsignore rules explicitly allow them."
            echo "::notice::This pull request relaxes .agentsignore to allow changes to:"
            print_paths "${base_protected_paths}"
          else
            conclusion="success"
            title="No agent-protected paths changed"
            summary="No paths protected by either revision's .agentsignore rules changed."
            echo "No agent-protected paths changed."
          fi

          gh api --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${GITHUB_REPOSITORY}/check-runs" \
            -f name="agentsignore-policy" \
            -f head_sha="${HEAD_SHA}" \
            -f conclusion="${conclusion}" \
            -f details_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            -f external_id="agentsignore-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            -f "output[title]=${title}" \
            -f "output[summary]=${summary}" \
            --silent

          if [[ "${conclusion}" == "failure" ]]; then
            exit 1
          fi
