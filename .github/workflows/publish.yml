name: Publish Rudder plugin

# Publishes the repository-root plugin package to npmjs.org with Trusted
# Publishing, then creates a plugin-specific Git tag and GitHub Release. The
# first package version must be published manually because npm only allows a
# Trusted Publisher to be configured after the package exists. This workflow
# never accepts an npm write token.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-rudder-plugin
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Determine which plugin artifacts are missing
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          name="$(node -p "require('./package.json').name")"
          version="$(node -p "require('./package.json').version")"
          tag="rudder-plugin-v${version}"

          if [[ "${name}" != "@ruddercode/rudder-plugin" ]]; then
            echo "::error::Expected the root package to be @ruddercode/rudder-plugin; got ${name}."
            exit 1
          fi

          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

          if npm_view_output="$(npm view "${name}@${version}" version --registry=https://registry.npmjs.org 2>&1)"; then
            echo "npmjs.org already has ${name}@${version}."
            npm_publish=false
          elif [[ "${npm_view_output}" == *"E404"* || "${npm_view_output}" == *"404 Not Found"* ]]; then
            echo "npmjs.org is missing ${name}@${version}."
            npm_publish=true
          else
            echo "::error::Could not determine whether npmjs.org has ${name}@${version}."
            printf '%s\n' "${npm_view_output}"
            exit 1
          fi
          echo "npm_publish=${npm_publish}" >> "$GITHUB_OUTPUT"

          if [[ "${npm_publish}" == "false" ]]; then
            package_exists=true
          elif package_view_output="$(npm view "${name}" version --registry=https://registry.npmjs.org 2>&1)"; then
            package_exists=true
          elif [[ "${package_view_output}" == *"E404"* || "${package_view_output}" == *"404 Not Found"* ]]; then
            package_exists=false
          else
            echo "::error::Could not determine whether the ${name} package exists."
            printf '%s\n' "${package_view_output}"
            exit 1
          fi
          echo "package_exists=${package_exists}" >> "$GITHUB_OUTPUT"

          if [[ "${npm_publish}" == "true" && "${package_exists}" == "false" ]]; then
            manual_bootstrap_required=true
          else
            manual_bootstrap_required=false
          fi
          echo "manual_bootstrap_required=${manual_bootstrap_required}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists."
            tag_create=false
          else
            echo "Tag ${tag} is missing."
            tag_create=true
          fi
          echo "tag_create=${tag_create}" >> "$GITHUB_OUTPUT"

          if release_view_output="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" 2>&1)"; then
            echo "GitHub Release ${tag} already exists."
            release_create=false
          elif [[ "${release_view_output}" == *"HTTP 404"* ]]; then
            echo "GitHub Release ${tag} is missing."
            release_create=true
          else
            echo "::error::Could not determine whether GitHub Release ${tag} exists."
            printf '%s\n' "${release_view_output}"
            exit 1
          fi
          echo "release_create=${release_create}" >> "$GITHUB_OUTPUT"

          if [[ "${npm_publish}" == "true" || "${tag_create}" == "true" || "${release_create}" == "true" ]]; then
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Report required manual bootstrap publication
        if: steps.check.outputs.manual_bootstrap_required == 'true'
        run: |
          echo "::warning::@ruddercode/rudder-plugin does not exist on npmjs.org. Manual bootstrap publication is required before release automation can continue."
          {
            echo "## Manual npm bootstrap required"
            echo
            echo "GitHub Actions will not receive an npm write token or create release artifacts yet."
          } >> "$GITHUB_STEP_SUMMARY"

      # Trusted Publishers and provenance require npm >= 11.5.1.
      - if: steps.check.outputs.release_needed == 'true' && steps.check.outputs.manual_bootstrap_required == 'false'
        run: npm install --global npm@latest

      - if: steps.check.outputs.release_needed == 'true' && steps.check.outputs.manual_bootstrap_required == 'false'
        run: npm ci

      - name: Validate the plugin package
        if: steps.check.outputs.release_needed == 'true' && steps.check.outputs.manual_bootstrap_required == 'false'
        run: |
          npm run check:agent-layout
          npm run typecheck
          npm test
          npm run build
          npm pack --dry-run

      - name: Publish plugin to npmjs.org with Trusted Publishing
        if: steps.check.outputs.npm_publish == 'true' && steps.check.outputs.manual_bootstrap_required == 'false'
        run: npm publish --access public --registry=https://registry.npmjs.org

      - name: Tag the plugin release
        if: steps.check.outputs.tag_create == 'true' && steps.check.outputs.manual_bootstrap_required == 'false'
        run: |
          git tag "${{ steps.check.outputs.tag }}"
          git push origin "${{ steps.check.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.release_create == 'true' && steps.check.outputs.manual_bootstrap_required == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.check.outputs.tag }}" \
            --verify-tag \
            --title "Rudder plugin ${{ steps.check.outputs.version }}" \
            --generate-notes
