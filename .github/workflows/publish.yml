name: Publish to npm

# Publishes @vivekyy/rudder to npm automatically on merge to main — no manual
# tagging step. On every push to main this single job:
#
#   1. computes v<version> from package.json
#   2. if that tag already exists -> no-op (the merge didn't bump the version)
#   3. otherwise -> npm publish, then push the v<version> tag as the "shipped"
#      marker (tagging AFTER publish, so a failed publish leaves no tag and a
#      re-run retries cleanly)
#
# Auth uses npm Trusted Publishers (OIDC) — no NPM_TOKEN secret. This is the
# workflow npm validates, so the Trusted Publisher at
#   npmjs.com -> package -> Settings -> Trusted Publisher
# must name `publish.yml`.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-to-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine whether this version needs publishing
        id: check
        run: |
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists — version unchanged, nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${tag} not found — will publish and tag."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.check.outputs.publish == 'true'
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishers (OIDC) needs npm >= 11.5.1, newer than what the
      # runner ships. Provenance is generated automatically for public packages.
      - if: steps.check.outputs.publish == 'true'
        run: npm install -g npm@latest

      - if: steps.check.outputs.publish == 'true'
        run: npm ci

      - if: steps.check.outputs.publish == 'true'
        run: npm publish

      - name: Tag the published release
        if: steps.check.outputs.publish == 'true'
        run: |
          git tag "${{ steps.check.outputs.tag }}"
          git push origin "${{ steps.check.outputs.tag }}"
