name: Desktop Package

# Builds the downloadable Rudder desktop app on main. The npm package is no
# longer the product surface; Electron packaging produces the distributable.
on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: desktop-package
  cancel-in-progress: false

jobs:
  package-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - run: npm run package -- --linux AppImage --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: rudder-linux
          path: release/*
